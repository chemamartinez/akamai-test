# Filebeat configuration for Akamai (native) input performance testing.
# Variables are expanded by Filebeat from environment variables.
# Set all ${VAR} values via environment before launching Filebeat.
#
# Required env vars:
#   AKAMAI_URL            - Akamai API base URL (e.g. https://host.akamai.com)
#   AKAMAI_CLIENT_TOKEN   - EdgeGrid client token
#   AKAMAI_ACCESS_TOKEN   - EdgeGrid access token
#   AKAMAI_CLIENT_SECRET  - EdgeGrid client secret
#   INTERVAL              - Polling interval (e.g. 5m)
#   INITIAL_INTERVAL      - Lookback window for first run (e.g. 1h)
#   EVENT_LIMIT           - Max events per API call (e.g. 10000)
#   AKAMAI_WORKERS        - Number of worker goroutines (e.g. 1)
#   AKAMAI_BATCH_SIZE     - Events per internal batch (e.g. 1000)
#   OUTPUT_DIR            - Directory for output.file events
#   LOG_DIR               - Directory for Filebeat log files
#
# Hardcoded (API server characteristics, not tunable per test):
#   offset_ttl: 120s                          - Offset token validity on API server
#   invalid_timestamp_retry.max_attempts: 2   - HMAC clock-skew retry attempts
#   max_recovery_attempts: 3                  - Chain recovery attempts

filebeat.inputs:
- type: akamai
  resource.url: "${AKAMAI_URL}"
  config_ids: "1"

  auth.edgegrid.client_token: "${AKAMAI_CLIENT_TOKEN}"
  auth.edgegrid.client_secret: "${AKAMAI_CLIENT_SECRET}"
  auth.edgegrid.access_token: "${AKAMAI_ACCESS_TOKEN}"

  interval: "${INTERVAL}"
  initial_interval: "${INITIAL_INTERVAL}"
  event_limit: "${EVENT_LIMIT}"
  offset_ttl: 120s
  invalid_timestamp_retry.max_attempts: 2
  max_recovery_attempts: 3

  number_of_workers: ${AKAMAI_WORKERS}
  batch_size: ${AKAMAI_BATCH_SIZE}

  # Optional tuning (uncomment to override defaults):
  # stream_buffer_size: 4

  # resource.rate_limit.limit: 5.0
  # resource.rate_limit.burst: 1

  tags:
    - preserve_original_event
    - akamai-siem

# =============================== HTTP Endpoint ================================

http.host: 127.0.0.1
http.port: 5066
http.pprof.enabled: true
http.pprof.block_profile_rate: 1
http.pprof.mem_profile_rate: 1
http.pprof.mutex_profile_rate: 1

# ================================== Output ====================================

output.file:
  path: "${OUTPUT_DIR}"
  filename: filebeat_output

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~

# ================================== Logging ===================================

logging.level: info
logging.to_files: true
logging.metrics.period: 1m
logging.files:
  path: "${LOG_DIR}"
  name: filebeat
  keepfiles: 1024
  permissions: 0640
